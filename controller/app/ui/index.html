<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>auto-browser Operator Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --orange: #e3b341;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
  header h1 { font-size: 16px; font-weight: 600; }
  .ver { font-size: 11px; color: var(--muted); background: var(--border); padding: 2px 6px; border-radius: 4px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  main { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 49px); }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
  .session-list { overflow-y: auto; flex: 1; }
  .session-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .session-item:hover, .session-item.active { background: rgba(88,166,255,.08); }
  .session-item .sid { font-family: monospace; font-size: 12px; color: var(--accent); }
  .session-item .surl { font-size: 11px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stag { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-top: 4px; }
  .stag-active { background: rgba(63,185,80,.15); color: var(--green); }
  .stag-closed { background: rgba(139,148,158,.15); color: var(--muted); }
  .stag-failed { background: rgba(248,81,73,.15); color: var(--red); }
  .content { display: flex; flex-direction: column; overflow: hidden; }
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .toolbar select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
  .btn { background: rgba(88,166,255,.15); border: 1px solid rgba(88,166,255,.3); color: var(--accent); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .btn:hover { background: rgba(88,166,255,.25); }
  .btn-danger { background: rgba(248,81,73,.1); border-color: rgba(248,81,73,.3); color: var(--red); }
  .panels { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
  .panel { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
  .panel:last-child { border-right: none; }
  .panel-header { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .screenshot-panel { position: relative; overflow: hidden; background: #000; }
  .screenshot-panel img { width: 100%; height: 100%; object-fit: contain; display: none; }
  .screenshot-panel .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); flex-direction: column; gap: 8px; }
  .event-log { overflow-y: auto; flex: 1; font-family: monospace; font-size: 11px; }
  .event-item { padding: 6px 12px; border-bottom: 1px solid rgba(48,54,61,.5); display: flex; gap: 6px; align-items: baseline; }
  .etime { color: var(--muted); flex-shrink: 0; }
  .etype { font-weight: 600; flex-shrink: 0; }
  .etype-observe { color: var(--accent); }
  .etype-action { color: var(--green); }
  .etype-approval { color: var(--orange); }
  .etype-session { color: var(--muted); }
  .approval-list { overflow-y: auto; flex: 1; }
  .approval-item { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .approval-item .aid { font-family: monospace; font-size: 11px; color: var(--muted); }
  .approval-item .areason { font-size: 12px; margin: 4px 0; }
  .approval-actions { display: flex; gap: 6px; margin-top: 6px; }
  .btn-sm { font-size: 11px; padding: 2px 8px; }
  .bottom-bar { display: flex; align-items: center; padding: 6px 16px; background: var(--surface); border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); gap: 16px; flex-shrink: 0; }
  .empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--muted); font-size: 13px; min-height: 60px; }
</style>
</head>
<body>
<header>
  <div class="status-dot" id="conn-dot"></div>
  <h1>auto-browser</h1>
  <span class="ver">v1.1.2</span>
  <span id="conn-label" style="font-size:12px;color:var(--muted);margin-left:4px">idle</span>
  <div style="flex:1"></div>
  <span style="font-size:12px;color:var(--muted)">Operator Dashboard</span>
</header>

<main>
  <div class="sidebar">
    <div class="sidebar-section">
      <h2>Sessions</h2>
      <button class="btn" style="width:100%" id="btn-refresh-sessions">Refresh</button>
    </div>
    <div class="session-list" id="session-list"></div>
  </div>

  <div class="content">
    <div class="toolbar">
      <span style="font-size:12px;color:var(--muted)">Session:</span>
      <span id="active-session-id" style="font-family:monospace;font-size:12px;color:var(--accent)">none</span>
      <div style="flex:1"></div>
      <select id="preset-select">
        <option value="normal">normal</option>
        <option value="fast">fast</option>
        <option value="rich">rich</option>
      </select>
      <button class="btn" id="btn-observe">Observe</button>
      <button class="btn" id="btn-diff">Diff</button>
      <button class="btn btn-danger" id="btn-close">Close Session</button>
    </div>

    <div class="panels">
      <div class="panel screenshot-panel" id="screenshot-panel">
        <div class="panel-header">
          <span>Screenshot</span>
          <span id="screenshot-label" style="font-size:10px;color:var(--muted)"></span>
        </div>
        <div class="placeholder" id="screenshot-placeholder">
          <span>No screenshot yet</span>
        </div>
        <img id="screenshot-img" alt="Browser screenshot">
      </div>

      <div class="panel" style="display:flex;flex-direction:column;overflow:hidden;">
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid var(--border)">
          <div class="panel-header">
            <span>Event Stream</span>
            <button class="btn btn-sm" id="btn-clear-events">Clear</button>
          </div>
          <div class="event-log" id="event-log">
            <div class="empty">Select a session to start</div>
          </div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
          <div class="panel-header">
            <span>Pending Approvals</span>
            <button class="btn btn-sm" id="btn-refresh-approvals">Refresh</button>
          </div>
          <div class="approval-list" id="approval-list">
            <div class="empty">No pending approvals</div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <span id="bar-url">URL: —</span>
      <span id="bar-title">Title: —</span>
      <span id="bar-events">Events: 0</span>
      <div style="flex:1"></div>
      <span id="bar-time"></span>
    </div>
  </div>
</main>

<script>
  "use strict";
  const BASE = '';
  let activeSessionId = null;
  let sse = null;
  let eventCount = 0;

  function text(el, val) { el.textContent = String(val ?? ''); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  setInterval(() => { text(document.getElementById('bar-time'), new Date().toLocaleTimeString()); }, 1000);

  // Sessions
  async function loadSessions() {
    try {
      const r = await fetch(BASE + '/sessions');
      if (!r.ok) return;
      const sessions = await r.json();
      const el = document.getElementById('session-list');
      while (el.firstChild) el.removeChild(el.firstChild);
      if (!sessions.length) {
        const d = document.createElement('div'); d.className = 'empty'; d.textContent = 'No sessions'; el.appendChild(d); return;
      }
      sessions.forEach(s => {
        const d = document.createElement('div');
        d.className = 'session-item' + (s.id === activeSessionId ? ' active' : '');
        d.addEventListener('click', () => selectSession(s.id));
        const sid = document.createElement('div'); sid.className = 'sid'; sid.textContent = s.id.slice(0,12); d.appendChild(sid);
        const url = document.createElement('div'); url.className = 'surl'; url.textContent = s.current_url || '—'; d.appendChild(url);
        const tag = document.createElement('span'); tag.className = 'stag stag-' + (s.status || 'active'); tag.textContent = s.status || 'active'; d.appendChild(tag);
        el.appendChild(d);
      });
    } catch {}
  }

  function selectSession(id) {
    activeSessionId = id;
    text(document.getElementById('active-session-id'), id.slice(0,12));
    const log = document.getElementById('event-log');
    while (log.firstChild) log.removeChild(log.firstChild);
    eventCount = 0;
    text(document.getElementById('bar-events'), 'Events: 0');
    connectSSE(id);
    loadApprovals();
    loadSessions();
  }

  // SSE
  function connectSSE(sessionId) {
    if (sse) { sse.close(); sse = null; }
    const dot = document.getElementById('conn-dot');
    const label = document.getElementById('conn-label');
    dot.className = 'status-dot';
    text(label, 'connecting…');
    sse = new EventSource(BASE + '/sessions/' + encodeURIComponent(sessionId) + '/events');
    sse.onopen = () => { dot.className = 'status-dot live'; text(label, 'connected'); };
    sse.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch {} };
    sse.onerror = () => { dot.className = 'status-dot'; text(label, 'disconnected'); };
  }

  function handleEvent(ev) {
    eventCount++;
    text(document.getElementById('bar-events'), 'Events: ' + eventCount);
    const log = document.getElementById('event-log');
    const ph = log.querySelector('.empty');
    if (ph) log.removeChild(ph);
    const item = document.createElement('div'); item.className = 'event-item';
    const tEl = document.createElement('span'); tEl.className = 'etime';
    tEl.textContent = ev.timestamp ? new Date(ev.timestamp).toLocaleTimeString() : '—';
    item.appendChild(tEl);
    const typeEl = document.createElement('span'); typeEl.className = 'etype etype-' + (ev.event || 'unknown');
    typeEl.textContent = ev.event || 'event';
    item.appendChild(typeEl);
    const detail = document.createElement('span');
    detail.textContent = ev.url || ev.action || ev.status || '';
    item.appendChild(detail);
    log.insertBefore(item, log.firstChild);
    while (log.children.length > 200) log.removeChild(log.lastChild);
    if (ev.event === 'observe') {
      text(document.getElementById('bar-url'), 'URL: ' + (ev.url || '—'));
      text(document.getElementById('bar-title'), 'Title: ' + (ev.title || '—'));
      if (ev.screenshot_url) updateScreenshot(ev.screenshot_url);
    }
    if (ev.event === 'approval') loadApprovals();
  }

  document.getElementById('btn-clear-events').addEventListener('click', () => {
    const log = document.getElementById('event-log');
    while (log.firstChild) log.removeChild(log.firstChild);
    const d = document.createElement('div'); d.className = 'empty'; d.textContent = 'Cleared'; log.appendChild(d);
    eventCount = 0; text(document.getElementById('bar-events'), 'Events: 0');
  });

  // Observe
  document.getElementById('btn-observe').addEventListener('click', async () => {
    if (!activeSessionId) return;
    const preset = document.getElementById('preset-select').value;
    try {
      const r = await fetch(BASE + '/sessions/' + encodeURIComponent(activeSessionId) + '/observe', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({preset}),
      });
      if (!r.ok) return;
      const data = await r.json();
      if (data.screenshot_url) updateScreenshot(data.screenshot_url);
      text(document.getElementById('bar-url'), 'URL: ' + (data.url || '—'));
      text(document.getElementById('bar-title'), 'Title: ' + (data.title || '—'));
    } catch {}
  });

  function updateScreenshot(url) {
    const img = document.getElementById('screenshot-img');
    const ph = document.getElementById('screenshot-placeholder');
    img.src = BASE + url + '?t=' + Date.now();
    img.style.display = 'block';
    ph.style.display = 'none';
    text(document.getElementById('screenshot-label'), url.split('/').pop());
  }

  // Diff
  document.getElementById('btn-diff').addEventListener('click', async () => {
    if (!activeSessionId) return;
    try {
      const r = await fetch(BASE + '/sessions/' + encodeURIComponent(activeSessionId) + '/screenshot/compare', {method:'POST'});
      if (!r.ok) return;
      const data = await r.json();
      if (data.diff_url) updateScreenshot(data.diff_url);
      if (data.changed_pct !== undefined) alert('Changed: ' + data.changed_pct + '% (' + data.changed_pixels + ' px)');
    } catch {}
  });

  // Close session
  document.getElementById('btn-close').addEventListener('click', async () => {
    if (!activeSessionId || !confirm('Close session ' + activeSessionId + '?')) return;
    await fetch(BASE + '/sessions/' + encodeURIComponent(activeSessionId), {method:'DELETE'}).catch(()=>{});
    activeSessionId = null;
    text(document.getElementById('active-session-id'), 'none');
    if (sse) { sse.close(); sse = null; }
    const dot = document.getElementById('conn-dot');
    dot.className = 'status-dot';
    text(document.getElementById('conn-label'), 'idle');
    loadSessions();
  });

  // Approvals
  async function loadApprovals() {
    try {
      const p = activeSessionId ? '?status=pending&session_id=' + encodeURIComponent(activeSessionId) : '?status=pending';
      const r = await fetch(BASE + '/approvals' + p);
      if (!r.ok) return;
      const items = await r.json();
      const el = document.getElementById('approval-list');
      while (el.firstChild) el.removeChild(el.firstChild);
      if (!items.length) {
        const d = document.createElement('div'); d.className = 'empty'; d.textContent = 'No pending approvals'; el.appendChild(d); return;
      }
      items.forEach(a => {
        const d = document.createElement('div'); d.className = 'approval-item';
        const aid = document.createElement('div'); aid.className = 'aid'; aid.textContent = (a.id || '') + ' · ' + (a.kind || ''); d.appendChild(aid);
        const reason = document.createElement('div'); reason.className = 'areason'; reason.textContent = a.reason || ''; d.appendChild(reason);
        const actions = document.createElement('div'); actions.className = 'approval-actions';
        const approveBtn = document.createElement('button'); approveBtn.className = 'btn btn-sm'; approveBtn.textContent = 'Approve';
        approveBtn.addEventListener('click', () => decideApproval(a.id, 'approve'));
        const rejectBtn = document.createElement('button'); rejectBtn.className = 'btn btn-sm btn-danger'; rejectBtn.textContent = 'Reject';
        rejectBtn.addEventListener('click', () => decideApproval(a.id, 'reject'));
        actions.appendChild(approveBtn); actions.appendChild(rejectBtn); d.appendChild(actions);
        el.appendChild(d);
      });
    } catch {}
  }

  async function decideApproval(id, decision) {
    try {
      const r = await fetch(BASE + '/approvals/' + encodeURIComponent(id) + '/' + decision, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:'{}',
      });
      if (r.ok) loadApprovals();
    } catch {}
  }

  document.getElementById('btn-refresh-sessions').addEventListener('click', loadSessions);
  document.getElementById('btn-refresh-approvals').addEventListener('click', loadApprovals);

  loadSessions();
  setInterval(loadSessions, 30000);
  setInterval(loadApprovals, 15000);
</script>
</body>
</html>
