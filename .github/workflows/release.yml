name: Release

# Tag-triggered publish: build wheels/sdists for the PyPI packages, publish
# via PyPI trusted publishing (OIDC — no tokens stored anywhere), then create
# the GitHub release with CHANGELOG notes and the artifacts attached.
#
# Each package publishes from its own GitHub environment because PyPI's
# pending-publisher uniqueness constraint is on (owner, repo, workflow,
# environment) WITHOUT the project name — a second pending publisher on the
# same tuple 500s (pypi/warehouse#20006, #20112). Distinct environments give
# each package its own slot.
#
# PyPI setup (one-time, per package): pypi.org → Publishing → add publisher
# with owner LvcidPsyche, repo auto-browser, workflow release.yml, and:
#   auto-browser-client    → environment pypi
#   auto-browser-langchain → environment pypi-langchain
#   auto-browser-mcp       → environment pypi-mcp

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for f in client/pyproject.toml integrations/langchain/pyproject.toml packaging/auto-browser-mcp/pyproject.toml; do
            V=$(python -c "import tomllib; print(tomllib.load(open('$f','rb'))['project']['version'])")
            if [ "$V" != "$TAG" ]; then
              echo "::error::$f declares version $V but the tag is $TAG"
              exit 1
            fi
          done
      - name: Build distributions
        run: |
          python -m pip install build
          python -m build --outdir dist client
          python -m build --outdir dist integrations/langchain
          python -m build --outdir dist packaging/auto-browser-mcp
          ls -l dist/
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: auto-browser-client
            environment: pypi
            dist_glob: auto_browser_client-*
          - package: auto-browser-langchain
            environment: pypi-langchain
            dist_glob: auto_browser_langchain-*
          - package: auto-browser-mcp
            environment: pypi-mcp
            dist_glob: auto_browser_mcp-*
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: all-dist/
      - name: Select ${{ matrix.package }} distributions
        run: |
          mkdir -p dist
          cp all-dist/${{ matrix.dist_glob }} dist/
          ls -l dist/
      - name: Publish ${{ matrix.package }} to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create GitHub release with CHANGELOG notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/extract_changelog.py "${GITHUB_REF_NAME#v}" > /tmp/notes.md
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; uploading artifacts only."
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "$GITHUB_REF_NAME" \
              --notes-file /tmp/notes.md
          fi
