name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: python -m pip install ruff
      - name: Ruff check
        run: make lint
      - name: Validate agent eval matrix
        run: python scripts/agent_eval.py --mock --json --report-file /tmp/agent-evals.md
      - name: Validate fixture eval matrix
        run: python scripts/fixture_eval.py

  host-tests:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install host test dependencies
        run: python -m pip install -e ./controller[dev]
      - name: Run controller tests on host Python
        run: |
          cd controller
          python -m pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

  client-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install client test dependencies
        run: python -m pip install -e ./client[dev]
      - name: Run direct client tests
        run: |
          cd client
          PYTHONPATH=. python -m pytest tests -q

  dependency-audit:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: browser-node/package-lock.json
      - name: Install Python audit tool
        run: python -m pip install pip-audit
      - name: Audit Python runtime dependencies
        run: python -m pip_audit -r controller/requirements.txt
      - name: Install browser-node dependencies from lockfile
        run: npm ci --omit=dev --no-audit --no-fund
        working-directory: browser-node
      - name: Audit browser-node production dependencies
        run: npm audit --omit=dev --audit-level=high
        working-directory: browser-node

  package-build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tool
        run: python -m pip install build
      - name: Build Python wheels
        run: |
          python -m build --wheel --outdir /tmp/wheelhouse controller
          python -m build --wheel --outdir /tmp/wheelhouse client
          python -m build --wheel --outdir /tmp/wheelhouse integrations/langchain
          python -m build --wheel --outdir /tmp/wheelhouse packaging/auto-browser-mcp

  controller-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Docker compose config
        run: |
          docker compose -f docker-compose.yml config >/tmp/compose-main.out
          docker compose -f docker-compose.yml -f docker-compose.isolation.yml config >/tmp/compose-isolation.out

      - name: Build controller image
        run: docker compose build controller

      - name: Run controller unit tests
        run: docker compose run --no-deps --rm controller python -m unittest discover -s tests -v

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [host-tests, client-tests, dependency-audit, package-build, controller-tests]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Run doctor smoke test
        run: DOCTOR_BUILD=1 ./scripts/doctor.sh

      - name: Run isolated session smoke test
        run: DOCTOR_BUILD=1 API_PORT=8010 ./scripts/smoke_isolated_session.sh
