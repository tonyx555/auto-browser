version: 2
updates:
  - package-ecosystem: pip
    directory: /controller
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /browser-node
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
    open-pull-requests-limit: 5
