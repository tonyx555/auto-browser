services:
  browser-node:
    build:
      context: ./browser-node
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    environment:
      BROWSER_WIDTH: ${BROWSER_WIDTH:-1280}
      BROWSER_HEIGHT: ${BROWSER_HEIGHT:-800}
      BROWSER_URL: ${BROWSER_URL:-about:blank}
      BROWSER_WS_ENDPOINT_FILE: /data/profile/browser-ws-endpoint.txt
      PLAYWRIGHT_SERVER_HOST: 0.0.0.0
      PLAYWRIGHT_SERVER_PORT: 9223
      PLAYWRIGHT_SERVER_ADVERTISED_HOST: browser-node
    volumes:
      - ./data/browser-profile:/data/profile
      - ./data/downloads:/data/downloads
    ports:
      - "127.0.0.1:${NOVNC_PORT:-6080}:6080"
      - "127.0.0.1:${VNC_PORT:-5900}:5900"

  controller:
    build:
      context: ./controller
    depends_on:
      browser-node:
        condition: service_healthy
    environment:
      API_BEARER_TOKEN: ${API_BEARER_TOKEN:-}
      CONTROLLER_ALLOWED_HOSTS: ${CONTROLLER_ALLOWED_HOSTS:-localhost,127.0.0.1,::1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BROWSER_WS_ENDPOINT_FILE: /data/browser-profile/browser-ws-endpoint.txt
      TAKEOVER_URL: ${TAKEOVER_URL:-http://127.0.0.1:6080/vnc.html?autoconnect=true&resize=scale}
      REMOTE_ACCESS_INFO_PATH: ${REMOTE_ACCESS_INFO_PATH:-/data/tunnels/reverse-ssh.json}
      REMOTE_ACCESS_STALE_AFTER_SECONDS: ${REMOTE_ACCESS_STALE_AFTER_SECONDS:-45}
      COMPLIANCE_TEMPLATE: ${COMPLIANCE_TEMPLATE:-}
      COMPLIANCE_MANIFEST_PATH: ${COMPLIANCE_MANIFEST_PATH:-/data/compliance-manifest.json}
      ARTIFACT_ROOT: /data/artifacts
      UPLOAD_ROOT: /data/uploads
      AUTH_ROOT: /data/auth
      APPROVAL_ROOT: /data/approvals
      AUDIT_ROOT: /data/audit
      STATE_DB_PATH: ${STATE_DB_PATH:-}
      AUDIT_MAX_EVENTS: ${AUDIT_MAX_EVENTS:-10000}
      JOB_STORE_ROOT: /data/jobs
      SESSION_STORE_ROOT: /data/sessions
      REDIS_URL: ${REDIS_URL:-}
      SESSION_STORE_REDIS_PREFIX: ${SESSION_STORE_REDIS_PREFIX:-auto_browser:sessions}
      AGENT_JOB_WORKER_COUNT: ${AGENT_JOB_WORKER_COUNT:-1}
      AUTH_STATE_ENCRYPTION_KEY: ${AUTH_STATE_ENCRYPTION_KEY:-}
      REQUIRE_AUTH_STATE_ENCRYPTION: ${REQUIRE_AUTH_STATE_ENCRYPTION:-false}
      AUTH_STATE_MAX_AGE_HOURS: ${AUTH_STATE_MAX_AGE_HOURS:-72}
      OCR_ENABLED: ${OCR_ENABLED:-true}
      MEMORY_ROOT: /data/memory
      MEMORY_ENABLED: ${MEMORY_ENABLED:-true}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-eng}
      OCR_MAX_BLOCKS: ${OCR_MAX_BLOCKS:-20}
      OCR_TEXT_LIMIT: ${OCR_TEXT_LIMIT:-1200}
      OPERATOR_ID_HEADER: ${OPERATOR_ID_HEADER:-X-Operator-Id}
      OPERATOR_NAME_HEADER: ${OPERATOR_NAME_HEADER:-X-Operator-Name}
      REQUIRE_OPERATOR_ID: ${REQUIRE_OPERATOR_ID:-false}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-}
      MCP_TOOL_PROFILE: ${MCP_TOOL_PROFILE:-curated}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-example.com,localhost,127.0.0.1,::1}
      REQUEST_RATE_LIMIT_ENABLED: ${REQUEST_RATE_LIMIT_ENABLED:-true}
      REQUEST_RATE_LIMIT_REQUESTS: ${REQUEST_RATE_LIMIT_REQUESTS:-120}
      REQUEST_RATE_LIMIT_WINDOW_SECONDS: ${REQUEST_RATE_LIMIT_WINDOW_SECONDS:-60}
      REQUEST_RATE_LIMIT_MAX_BUCKETS: ${REQUEST_RATE_LIMIT_MAX_BUCKETS:-4096}
      REQUEST_RATE_LIMIT_EXEMPT_PATHS: ${REQUEST_RATE_LIMIT_EXEMPT_PATHS:-/healthz,/readyz,/docs,/openapi.json,/redoc,/artifacts,/metrics}
      DEFAULT_VIEWPORT_WIDTH: ${BROWSER_WIDTH:-1280}
      DEFAULT_VIEWPORT_HEIGHT: ${BROWSER_HEIGHT:-800}
      MAX_SESSIONS: ${MAX_SESSIONS:-1}
      REQUIRE_APPROVAL_FOR_UPLOADS: ${REQUIRE_APPROVAL_FOR_UPLOADS:-true}
      ENABLE_TRACING: ${ENABLE_TRACING:-true}
      STEALTH_ENABLED: ${STEALTH_ENABLED:-false}
      TYPING_DELAY_MS: ${TYPING_DELAY_MS:-20}
      ACTION_TIMEOUT_MS: ${ACTION_TIMEOUT_MS:-15000}
      CONNECT_RETRIES: ${CONNECT_RETRIES:-60}
      CONNECT_RETRY_DELAY_SECONDS: ${CONNECT_RETRY_DELAY_SECONDS:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_AUTH_MODE: ${OPENAI_AUTH_MODE:-api}
      OPENAI_CLI_PATH: ${OPENAI_CLI_PATH:-codex}
      OPENAI_CLI_MODEL: ${OPENAI_CLI_MODEL:-}
      OPENAI_HOST_BRIDGE_SOCKET: ${OPENAI_HOST_BRIDGE_SOCKET:-/data/host-bridge/codex.sock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      CLAUDE_AUTH_MODE: ${CLAUDE_AUTH_MODE:-api}
      CLAUDE_CLI_PATH: ${CLAUDE_CLI_PATH:-claude}
      CLAUDE_CLI_MODEL: ${CLAUDE_CLI_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_AUTH_MODE: ${GEMINI_AUTH_MODE:-api}
      GEMINI_CLI_PATH: ${GEMINI_CLI_PATH:-gemini}
      GEMINI_CLI_MODEL: ${GEMINI_CLI_MODEL:-}
      CLI_HOME: ${CLI_HOME:-/data/cli-home}
      MODEL_REQUEST_TIMEOUT_SECONDS: ${MODEL_REQUEST_TIMEOUT_SECONDS:-60}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-2}
      MODEL_RETRY_BACKOFF_SECONDS: ${MODEL_RETRY_BACKOFF_SECONDS:-1}
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"

  reverse-ssh:
    profiles: ["reverse-ssh"]
    build:
      context: ./reverse-ssh
    depends_on:
      browser-node:
        condition: service_healthy
      controller:
        condition: service_started
    environment:
      REVERSE_SSH_HOST: ${REVERSE_SSH_HOST:-}
      REVERSE_SSH_PORT: ${REVERSE_SSH_PORT:-22}
      REVERSE_SSH_USER: ${REVERSE_SSH_USER:-}
      REVERSE_SSH_KEY_PATH: ${REVERSE_SSH_KEY_PATH:-/ssh/id_ed25519}
      REVERSE_SSH_KNOWN_HOSTS_PATH: ${REVERSE_SSH_KNOWN_HOSTS_PATH:-/ssh/known_hosts}
      REVERSE_SSH_STRICT_HOST_KEY_CHECKING: ${REVERSE_SSH_STRICT_HOST_KEY_CHECKING:-yes}
      REVERSE_SSH_REMOTE_BIND_ADDRESS: ${REVERSE_SSH_REMOTE_BIND_ADDRESS:-127.0.0.1}
      REVERSE_SSH_REMOTE_API_PORT: ${REVERSE_SSH_REMOTE_API_PORT:-18000}
      REVERSE_SSH_REMOTE_NOVNC_PORT: ${REVERSE_SSH_REMOTE_NOVNC_PORT:-16080}
      REVERSE_SSH_LOCAL_API_HOST: controller
      REVERSE_SSH_LOCAL_API_PORT: 8000
      REVERSE_SSH_LOCAL_NOVNC_HOST: browser-node
      REVERSE_SSH_LOCAL_NOVNC_PORT: 6080
      REVERSE_SSH_SERVER_ALIVE_INTERVAL: ${REVERSE_SSH_SERVER_ALIVE_INTERVAL:-30}
      REVERSE_SSH_SERVER_ALIVE_COUNT_MAX: ${REVERSE_SSH_SERVER_ALIVE_COUNT_MAX:-3}
      REVERSE_SSH_INFO_INTERVAL_SECONDS: ${REVERSE_SSH_INFO_INTERVAL_SECONDS:-15}
      REVERSE_SSH_STALE_AFTER_SECONDS: ${REVERSE_SSH_STALE_AFTER_SECONDS:-45}
      REVERSE_SSH_ALLOW_NONLOCAL_BIND: ${REVERSE_SSH_ALLOW_NONLOCAL_BIND:-false}
      REVERSE_SSH_ACCESS_MODE: ${REVERSE_SSH_ACCESS_MODE:-private}
      REVERSE_SSH_INFO_PATH: /data/tunnels/reverse-ssh.json
      REVERSE_SSH_PUBLIC_HOST: ${REVERSE_SSH_PUBLIC_HOST:-}
      REVERSE_SSH_PUBLIC_SCHEME: ${REVERSE_SSH_PUBLIC_SCHEME:-http}
      REVERSE_SSH_PUBLIC_API_URL: ${REVERSE_SSH_PUBLIC_API_URL:-}
      REVERSE_SSH_PUBLIC_TAKEOVER_URL: ${REVERSE_SSH_PUBLIC_TAKEOVER_URL:-}
    restart: unless-stopped
    volumes:
      - ./data/ssh:/ssh:ro
      - ./data/tunnels:/data/tunnels
